<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clovr · Loans & Lending</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #050505;
    --card: #0F0F11;
    --border: #1F1F22;
    --foreground: #FAFAFA;
    --muted: #17171A;
    --muted-foreground: #9CA3AF;
    --primary: #22C55E;
    --primary-foreground: #022C22;
    --accent: #24242A;
    --destructive: #F87171;
    --emerald-50: #022c22;
    --emerald-600: #34D399;
    --emerald-700: #6EE7B7;
    --amber-50: #1F1502;
    --amber-600: #FBBF24;
    --amber-700: #FCD34D;
    --red-50: #1F0606;
    --red-600: #F87171;
    --red-700: #FCA5A5;
    --violet-100: #1F1338;
    --violet-600: #A78BFA;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Text", system-ui, sans-serif;
    background: var(--bg);
    color: var(--foreground);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.45;
  }
  button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select { font: inherit; color: inherit; }

  .wrap { max-width: 768px; margin: 0 auto; padding: 20px 16px 80px; }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  h2 { font-size: 16px; font-weight: 700; }
  h3 { font-size: 13px; font-weight: 600; }
  p { color: var(--muted-foreground); }
  .muted { color: var(--muted-foreground); }
  .foreground { color: var(--foreground); }

  .page-head p { font-size: 12px; margin-top: 2px; }

  .summary-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px;
  }
  .summary-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .summary-card .label { font-size: 10px; font-weight: 500; color: var(--muted-foreground); }
  .summary-card .value { font-size: 16px; font-weight: 700; margin-top: 4px; line-height: 1; }

  .tabs {
    display: flex; gap: 8px; margin: 20px -16px 0; padding: 2px 16px;
    overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-pill {
    flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 9999px; font-size: 12px; font-weight: 600;
    background: var(--muted); color: var(--muted-foreground);
    transition: all 0.15s;
  }
  .tab-pill:hover { background: var(--accent); color: var(--foreground); }
  .tab-pill.active {
    background: var(--primary); color: var(--primary-foreground);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .tab-pill .icon { width: 12px; height: 12px; }

  .content { margin-top: 20px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .card-title-sm {
    font-size: 10px; font-weight: 700; color: var(--muted-foreground);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;
  }
  .card-sub { font-size: 11px; color: var(--muted-foreground); margin-bottom: 12px; }

  .cta-banner {
    display: flex; align-items: center; gap: 12px; padding: 16px;
    border: 1px dashed color-mix(in srgb, var(--primary) 40%, transparent);
    border-radius: 16px; width: 100%; text-align: left;
    background: linear-gradient(135deg, color-mix(in srgb, var(--primary) 5%, transparent), color-mix(in srgb, var(--primary) 10%, transparent), transparent);
    transition: all 0.15s;
  }
  .cta-banner:hover { border-color: color-mix(in srgb, var(--primary) 60%, transparent); }
  .cta-banner .cta-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--primary); color: var(--primary-foreground);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .cta-banner .cta-body { flex: 1; min-width: 0; }
  .cta-banner .cta-body p:first-child { font-size: 13px; font-weight: 600; color: var(--foreground); }
  .cta-banner .cta-body p:last-child { font-size: 11px; color: var(--muted-foreground); margin-top: 1px; }

  /* Loan cards */
  .loan-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .loan-head { padding: 16px; }
  .loan-top { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .loan-icon {
    width: 36px; height: 36px; border-radius: 12px; flex-shrink: 0;
    background: color-mix(in srgb, var(--primary) 10%, transparent);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
  }
  .loan-meta { display: flex; align-items: center; gap: 12px; }
  .loan-meta h3 { font-size: 13px; font-weight: 600; }
  .loan-meta p { font-size: 11px; margin-top: 1px; }
  .loan-tag {
    font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 9999px;
    background: var(--emerald-50); color: var(--emerald-700);
  }
  .chevron-btn {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .chevron-btn:hover { background: var(--muted); }
  .loan-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
  .stat {
    background: var(--muted); border-radius: 12px; padding: 10px;
  }
  .stat .label { font-size: 10px; color: var(--muted-foreground); }
  .stat .value { font-size: 13px; font-weight: 700; margin-top: 2px; }
  .progress {
    height: 8px; background: var(--muted); border-radius: 9999px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 9999px; }
  .progress-row {
    display: flex; justify-content: space-between; font-size: 11px;
    color: var(--muted-foreground); margin-bottom: 4px;
  }
  .loan-expand {
    border-top: 1px solid var(--border); padding: 16px; background: color-mix(in srgb, var(--muted) 30%, transparent);
    display: none;
  }
  .loan-expand.open { display: block; }
  .mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .mini-stat {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px;
  }
  .mini-stat .label { font-size: 10px; color: var(--muted-foreground); }
  .mini-stat .value { font-size: 11px; font-weight: 700; margin-top: 2px; }
  .link-btn {
    font-size: 12px; color: var(--primary); font-weight: 600;
  }

  /* Brokerage */
  .broker-head-row {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600; color: var(--muted-foreground);
  }
  .back-btn:hover { color: var(--foreground); }
  .chip {
    font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 9999px;
    background: color-mix(in srgb, var(--primary) 10%, transparent);
    color: var(--primary); text-transform: uppercase; letter-spacing: 0.08em;
  }
  .screen-title {
    display: flex; gap: 12px; align-items: flex-start; margin-bottom: 16px;
  }
  .screen-title .icon-tile {
    width: 36px; height: 36px; border-radius: 12px; flex-shrink: 0;
    background: color-mix(in srgb, var(--primary) 10%, transparent);
    color: var(--primary);
    display: flex; align-items: center; justify-content: center;
  }
  .screen-title h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
  .screen-title p { font-size: 11px; margin-top: 2px; line-height: 1.5; }

  .section-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .section-label {
    font-size: 10px; font-weight: 700; color: var(--muted-foreground);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .section-sub { font-size: 11px; color: var(--muted-foreground); margin-top: 2px; margin-bottom: 8px; }

  .kpi-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
  }
  .kpi-box {
    background: color-mix(in srgb, var(--muted) 50%, transparent);
    border: 1px solid var(--border); border-radius: 12px; padding: 12px;
  }
  .kpi-label {
    font-size: 10px; font-weight: 600; color: var(--muted-foreground);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .kpi-value { font-size: 16px; font-weight: 700; margin-top: 4px; line-height: 1; }
  .kpi-value.good { color: var(--emerald-600); }
  .kpi-value.danger { color: var(--red-600); }
  .kpi-sub { font-size: 11px; color: var(--muted-foreground); margin-top: 4px; }

  .list-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px; padding: 12px 0; border-top: 1px solid var(--border);
    text-align: left; width: calc(100% + 32px); margin: 0 -16px; padding-left: 16px; padding-right: 16px;
    transition: background 0.15s;
  }
  button.list-row:hover { background: color-mix(in srgb, var(--muted) 30%, transparent); }
  .list-row:first-child { border-top: none; }
  .list-row .left { min-width: 0; flex: 1; }
  .list-row .title { font-size: 12px; font-weight: 600; color: var(--foreground); }
  .list-row .sub { font-size: 11px; color: var(--muted-foreground); margin-top: 2px; line-height: 1.45; }
  .list-row .sub.danger { color: var(--red-600); }
  .list-row .sub.warn { color: var(--amber-600); }
  .list-row .sub.good { color: var(--emerald-600); }
  .list-row .right { flex-shrink: 0; display: flex; align-items: center; gap: 6px; }

  .status-pill {
    font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 9999px; white-space: nowrap;
    background: var(--muted); color: var(--muted-foreground);
  }
  .status-pill.good { background: var(--emerald-50); color: var(--emerald-700); }
  .status-pill.warn { background: var(--amber-50); color: var(--amber-700); }
  .status-pill.danger { background: var(--red-50); color: var(--red-700); }
  .action-link { font-size: 11px; color: var(--primary); font-weight: 600; }

  .info-block {
    margin-top: 12px; padding: 12px; border-radius: 12px;
    background: color-mix(in srgb, var(--muted) 40%, transparent);
    border: 1px solid var(--border);
  }
  .info-block .label {
    font-size: 10px; font-weight: 700; color: var(--muted-foreground);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;
  }
  .info-block p { font-size: 11px; line-height: 1.55; }
  .info-block strong { color: var(--foreground); }

  /* Form */
  .form-field { display: block; }
  .form-field + .form-field { margin-top: 12px; }
  .form-label {
    display: block; font-size: 10px; font-weight: 700; color: var(--muted-foreground);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
  }
  .form-hint { font-size: 11px; color: var(--muted-foreground); margin-top: 4px; }
  .text-input, .select-input {
    width: 100%; padding: 10px 12px; border-radius: 12px;
    background: var(--muted); border: 1px solid transparent;
    font-size: 13px; font-weight: 500; color: var(--foreground);
    outline: none; transition: border-color 0.15s;
  }
  .text-input:focus, .select-input:focus { border-color: var(--primary); }
  .input-prefix {
    position: relative;
  }
  .input-prefix::before {
    content: "$"; position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 13px; color: var(--muted-foreground); font-weight: 500;
  }
  .input-prefix .text-input { padding-left: 26px; }
  .input-suffix {
    position: relative;
  }
  .input-suffix::after {
    content: "%"; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    font-size: 13px; color: var(--muted-foreground); font-weight: 500;
  }
  .input-suffix .text-input { padding-right: 26px; }

  .pill-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill-btn {
    font-size: 11px; font-weight: 600; padding: 6px 12px; border-radius: 9999px;
    border: 1px solid var(--border); background: var(--muted); color: var(--muted-foreground);
    transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .pill-btn:hover { background: var(--accent); color: var(--foreground); }
  .pill-btn.active {
    background: var(--primary); color: var(--primary-foreground); border-color: var(--primary);
  }

  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

  /* Buttons */
  .btn {
    width: 100%; padding: 12px; border-radius: 9999px;
    font-size: 13px; font-weight: 600; transition: all 0.15s;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: var(--primary); color: var(--primary-foreground); }
  .btn.primary:hover { opacity: 0.92; }
  .btn.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.secondary {
    background: var(--muted); color: var(--foreground); border: 1px solid var(--border);
  }
  .btn.secondary:hover { background: var(--accent); }

  /* Modeler */
  .compare-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .compare-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .compare-card.a { border-color: color-mix(in srgb, var(--primary) 30%, var(--border)); }
  .compare-card.b { border-color: color-mix(in srgb, var(--violet-600) 40%, var(--border)); }
  .compare-card .label { font-size: 12px; font-weight: 700; }
  .compare-card .rate { font-size: 11px; margin-bottom: 12px; }
  .compare-card.a .label, .compare-card.a .rate { color: var(--primary); }
  .compare-card.b .label, .compare-card.b .rate { color: var(--violet-600); }
  .compare-card .mini-row {
    background: color-mix(in srgb, var(--muted) 60%, transparent);
    border-radius: 12px; padding: 8px; margin-top: 8px;
  }
  .compare-card.a .mini-row { background: color-mix(in srgb, var(--primary) 8%, transparent); }
  .compare-card.b .mini-row { background: var(--violet-100); }
  .compare-card .mini-row .label { font-size: 10px; color: var(--muted-foreground); font-weight: 500; }
  .compare-card .mini-row .value { font-size: 12px; font-weight: 700; color: var(--foreground); }

  .savings-callout {
    display: flex; align-items: center; gap: 12px; padding: 16px;
    border-radius: 16px; border: 1px solid;
  }
  .savings-callout.good { background: var(--emerald-50); border-color: color-mix(in srgb, var(--emerald-600) 30%, transparent); }
  .savings-callout.good .icon { color: var(--emerald-600); }
  .savings-callout .title { font-size: 13px; font-weight: 600; color: var(--foreground); }
  .savings-callout .sub { font-size: 12px; color: var(--muted-foreground); margin-top: 2px; }

  /* Schedule */
  .selector-pills {
    display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;
    margin: 0 -16px; padding: 0 16px 4px;
  }
  .selector-pills::-webkit-scrollbar { display: none; }

  .schedule-chart {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px;
  }
  .schedule-chart .top-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .schedule-chart h2 { font-size: 13px; }
  .schedule-chart .total-interest {
    text-align: right;
  }
  .schedule-chart .total-interest .label { font-size: 10px; color: var(--muted-foreground); }
  .schedule-chart .total-interest .value { font-size: 13px; font-weight: 700; color: var(--destructive); }

  .chart-svg { width: 100%; height: 160px; }

  .schedule-table-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
  }
  .schedule-table-head {
    display: flex; justify-content: space-between; padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .schedule-table-head h3 { font-size: 13px; }
  .export-btn {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; color: var(--primary); font-weight: 600;
  }
  table.sched {
    width: 100%; font-size: 11px; border-collapse: collapse;
  }
  table.sched th, table.sched td {
    padding: 10px 12px; text-align: left;
  }
  table.sched thead { background: color-mix(in srgb, var(--muted) 50%, transparent); }
  table.sched th {
    font-size: 10px; font-weight: 600; color: var(--muted-foreground);
    text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap;
  }
  table.sched tbody tr { border-top: 1px solid var(--border); }
  table.sched tbody tr:hover { background: color-mix(in srgb, var(--muted) 30%, transparent); }
  table.sched .num { text-align: right; }
  table.sched .principal { color: var(--emerald-600); font-weight: 500; }
  table.sched .interest { color: var(--destructive); }
  table.sched .balance { font-weight: 700; }
  .table-footer {
    padding: 12px; text-align: center; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted-foreground);
  }

  /* Savings callout in scenario */
  .scen-helper {
    font-size: 11px; color: var(--muted-foreground);
    line-height: 1.55; margin-top: 12px;
  }
  .scen-helper strong { color: var(--foreground); }

  /* Consent */
  .consent-banner {
    display: flex; align-items: flex-start; gap: 8px; padding: 12px;
    border-radius: 12px; background: color-mix(in srgb, var(--muted) 40%, transparent);
    border: 1px solid var(--border); margin-top: 12px;
  }
  .consent-banner svg { color: var(--emerald-600); flex-shrink: 0; margin-top: 2px; }
  .consent-banner p { font-size: 11px; line-height: 1.55; }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .tab-content { animation: fadeIn 0.25s ease; }

  /* Share banner */
  .share-banner {
    max-width: 768px; margin: 0 auto 12px; padding: 10px 14px;
    background: color-mix(in srgb, var(--primary) 8%, transparent);
    border: 1px solid color-mix(in srgb, var(--primary) 20%, transparent);
    border-radius: 12px; font-size: 12px; color: var(--foreground);
    display: flex; align-items: center; gap: 10px;
  }
  .share-banner strong { font-weight: 600; }
  .share-banner .tag {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    padding: 3px 8px; border-radius: 6px; background: var(--primary); color: var(--primary-foreground);
  }
</style>
</head>
<body>

<div class="share-banner" role="status">
  <span class="tag">Demo</span>
  <span><strong>Clovr · Loans & Lending</strong> — Standalone shareable preview. Fully interactive.</span>
</div>

<div class="wrap">
  <!-- Page header -->
  <div class="page-head">
    <h1>Loans & Lending</h1>
    <p>Track, model, broker, and optimize across all entities</p>
  </div>

  <!-- Summary -->
  <div class="summary-grid" id="summary-grid"></div>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Content -->
  <div class="content" id="content"></div>
</div>

<!-- ═══ Icons (lucide inlined) ══════════════════════════════════════ -->

  <defs>
    <!-- Stroke style icons -->
    <symbol id="i-landmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

const dealTypes = ["Refinance","Acquisition","Cash-out refi","Working capital LOC","Construction / bridge","SBA / owner-occupied"];

// ── Formatters ───────────────────────────────────────────────────
const fmt = n => n >= 1_000_000 ? `$${(n/1_000_000).toFixed(3)}M`
              : n >= 1_000 ? `$${(n/1_000).toFixed(1)}K`
              : `$${n.toLocaleString()}`;
const fmtCur = n => `$${n.toLocaleString("en-US",{minimumFractionDigits:2, maximumFractionDigits:2})}`;
const fmtCur0 = n => `$${Math.round(n).toLocaleString("en-US")}`;

// ── Amortization helpers ─────────────────────────────────────────
function computeAmortization(principal, annualRate, termMonths) {
  const r = annualRate / 100 / 12;
  const payment = r === 0
    ? principal / termMonths
    : (principal * r * Math.pow(1+r, termMonths)) / (Math.pow(1+r, termMonths) - 1);
  const schedule = [];
  let balance = principal;
  let totalInterest = 0;
  for (let m = 1; m <= termMonths; m++) {
    const interestPmt = balance * r;
    const principalPmt = payment - interestPmt;
    balance = Math.max(0, balance - principalPmt);
    totalInterest += interestPmt;
    if (m % 12 === 0 || m === 1 || m === termMonths) {
      schedule.push({ month:m, year:Math.ceil(m/12), payment, principal:principalPmt, interest:interestPmt, balance, totalInterest });
    }
  }
  return { schedule, payment, totalInterest, totalPaid: payment * termMonths };
}

function monthlyPaymentFor(principal, annualRatePct, amortYears) {
  const r = annualRatePct / 100 / 12;
  const n = amortYears * 12;
  if (r === 0) return principal / n;
  return principal * (r * Math.pow(1+r, n)) / (Math.pow(1+r, n) - 1);
}

function buildBrokerSchedule(principal, annualRatePct, amortYears, remainingYears) {
  const r = annualRatePct / 100 / 12;
  const totalAmortMonths = Math.round(amortYears * 12);
  const horizonMonths = Math.round(remainingYears * 12);
  const payment = monthlyPaymentFor(principal, annualRatePct, amortYears);
  let bal = principal;
  const rows = [];
  let totalInt = 0;
  for (let m = 1; m <= horizonMonths; m++) {
    const interest = r === 0 ? 0 : bal * r;
    let principalPaid = payment - interest;
    if (m > totalAmortMonths) principalPaid = 0;
    if (principalPaid > bal) principalPaid = bal;
    bal -= principalPaid;
    totalInt += interest;
    rows.push({ month:m, payment, interest, principal:principalPaid, balance: bal < 0 ? 0 : bal });
    if (bal <= 0.01) break;
  }
  return { payment, rows, totalInterest: totalInt, balloon: bal < 0 ? 0 : bal };
}

function aggregateAnnual(rows) {
  const out = [];
  for (let i = 0; i < rows.length; i += 12) {
    const chunk = rows.slice(i, i + 12);
    if (!chunk.length) continue;
    out.push({
      year: Math.floor(i/12) + 1,
      payment: chunk.reduce((a,r)=>a+r.payment,0),
      interest: chunk.reduce((a,r)=>a+r.interest,0),
      principal: chunk.reduce((a,r)=>a+r.principal,0),
      balance: chunk[chunk.length-1].balance,
    });
  }
  return out;
}

  if (state.activeTab === "loans") renderLoansTab(wrap);
  if (state.activeTab === "brokerage") renderBrokerage(wrap);
  if (state.activeTab === "modeler") renderModeler(wrap);
  if (state.activeTab === "schedule") renderSchedule(wrap);

}

function renderLoansTab(wrap) {

  else if (screen === "lender-match") renderBrokerLenderMatch(wrap);
  else if (screen === "term-sheets") renderBrokerTermSheets(wrap);
  else if (screen === "closing") renderBrokerClosing(wrap);
}

// Reusable markup helpers
function sectionCard(label, sub, inner) {
  return `
    <div class="section-card">
      <div class="section-label">${label}</div>
      ${sub ? `<p class="section-sub">${sub}</p>` : ""}
      ${inner}
    </div>
  `;
}

function kpiBox(label, value, sub, tone) {
  const toneCls = tone ? ` ${tone}` : "";
  return `
    <div class="kpi-box">
      <p class="kpi-label">${label}</p>
      <p class="kpi-value${toneCls}">${value}</p>
      ${sub ? `<p class="kpi-sub">${sub}</p>` : ""}
    </div>
  `;
}

function listRow({ title, sub, subTone, right, clickable }) {
  const Tag = clickable ? "button" : "div";
  const subCls = subTone ? ` ${subTone}` : "";
  return `
    <${Tag} class="list-row" ${clickable ? `data-action="${clickable}"` : ""}>
      <div class="left">
        <p class="title">${title}</p>
        ${sub ? `<p class="sub${subCls}">${sub}</p>` : ""}
      </div>
      ${right ? `<div class="right">${right}</div>` : ""}
    </${Tag}>
  `;
}

function statusPill(text, tone) {
  return `<span class="status-pill ${tone || ""}">${text}</span>`;
}

function primaryBtn(label, action, iconId) {
  return `<button class="btn primary" data-action="${action}">${label}${iconId ? iconSize(iconId, 14) : ""}</button>`;
}
function secondaryBtn(label, action) {
  return `<button class="btn secondary" data-action="${action}">${label}</button>`;
}

function wireActions(wrap, map) {
  wrap.querySelectorAll("[data-action]").forEach(el => {
    el.addEventListener("click", () => {
      const fn = map[el.dataset.action];
      if (fn) fn();
    });
  });
}

function goto(screen) {
  state.brokerScreen = screen;
  renderContent();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ─── LB10 Scenario runner ─────────────────────────────────────────
function renderBrokerScenario(wrap) {
  const container = document.createElement("div");
  container.className = "stack";
  const s = state.scen;

  const inputsHtml = sectionCard("Inputs", null, `
    <div class="grid-2">
      <div class="form-field"><label class="form-label">Current balance</label><div class="input-prefix"><input class="text-input" id="scen-balance" inputmode="decimal" value="${s.balance}"/></div></div>
      <div class="form-field"><label class="form-label">Current rate (%)</label><div class="input-suffix"><input class="text-input" id="scen-current" inputmode="decimal" value="${s.currentRate}"/></div></div>
      <div class="form-field"><label class="form-label">Scenario rate (%)</label><div class="input-suffix"><input class="text-input" id="scen-scenario" inputmode="decimal" value="${s.scenarioRate}"/></div></div>
      <div class="form-field"><label class="form-label">Remaining term (yrs)</label><input class="text-input" id="scen-remaining" inputmode="decimal" value="${s.remainingYears}"/></div>
      <div class="form-field"><label class="form-label">Amortization (yrs)</label><input class="text-input" id="scen-amort" inputmode="decimal" value="${s.amortYears}"/></div>
      <div class="form-field"><label class="form-label">Closing costs</label><div class="input-prefix"><input class="text-input" id="scen-closing" inputmode="decimal" value="${s.closingCosts}"/></div></div>
      <div class="form-field" style="grid-column:1/-1"><label class="form-label">Monthly escrow (optional)</label><div class="input-prefix"><input class="text-input" id="scen-escrow" inputmode="decimal" value="${s.monthlyEscrow}"/></div></div>
    </div>
    <div class="pill-group" style="margin-top:16px">
      <button class="pill-btn ${s.view==='monthly'?'active':''}" data-action="view-monthly">Monthly amortization</button>
      <button class="pill-btn ${s.view==='annual'?'active':''}" data-action="view-annual">Annual amortization</button>
    </div>
    ${primaryBtn("Run scenario","run")}
  `).replace(/<button class="btn primary"/, '<button class="btn primary" style="margin-top:16px"');

  const summaryDiv = `<div id="scen-summary"></div>`;
  const scheduleDiv = `<div id="scen-schedule"></div>`;

  container.innerHTML = inputsHtml + summaryDiv + scheduleDiv
    + primaryBtn(`Next: Lender match${iconSize("i-arrow-r",14)}`,"next")
    + secondaryBtn("Back","back");

  wrap.appendChild(container);

  function runScenario() {
    s.balance = $("#scen-balance").value;
    s.currentRate = $("#scen-current").value;
    s.scenarioRate = $("#scen-scenario").value;
    s.remainingYears = $("#scen-remaining").value;
    s.amortYears = $("#scen-amort").value;
    s.closingCosts = $("#scen-closing").value;
    s.monthlyEscrow = $("#scen-escrow").value;

    const p = parseFloat(s.balance) || 0;
    const cr = parseFloat(s.currentRate) || 0;
    const sr = parseFloat(s.scenarioRate) || 0;
    const ry = parseFloat(s.remainingYears) || 0;
    const ay = parseFloat(s.amortYears) || 0;
    const cc = parseFloat(s.closingCosts) || 0;
    const escrow = parseFloat(s.monthlyEscrow) || 0;
    if (!p || !ry || !ay) return;

    const current = buildBrokerSchedule(p, cr, ay, ry);
    const scenario = buildBrokerSchedule(p, sr, ay, ry);
    const monthlySavings = current.payment - scenario.payment;
    const annualSavings = monthlySavings * 12;
    const breakeven = monthlySavings > 0 ? cc / monthlySavings : 0;
    const annual = aggregateAnnual(scenario.rows);

    $("#scen-summary").innerHTML = sectionCard("Scenario summary", null, `
      <div class="kpi-grid">
        ${kpiBox("Current P&I", fmtCur0(current.payment + escrow), "Includes escrow")}
        ${kpiBox("Scenario P&I", fmtCur0(scenario.payment + escrow), "Includes escrow")}
        ${kpiBox("Monthly savings", fmtCur0(monthlySavings), "Current vs scenario", monthlySavings > 0 ? "good" : "danger")}
        ${kpiBox("Annual savings", fmtCur0(annualSavings), "12 × monthly delta", annualSavings > 0 ? "good" : "danger")}
        ${kpiBox("Break-even", monthlySavings > 0 ? `${breakeven.toFixed(1)} mo` : "—", "Closing / savings")}
        ${kpiBox("Balloon at maturity", fmtCur0(scenario.balloon), "End of remaining term")}
      </div>
      <p class="scen-helper">
        Scenario compares <strong>${cr.toFixed(2)}%</strong> vs <strong>${sr.toFixed(2)}%</strong>
        over <strong>${ry.toFixed(1)} years</strong> with <strong>${ay.toFixed(1)}-yr amortization</strong>.
        Payments include escrow of ${fmtCur0(escrow)}.
      </p>
    `);

    // Schedule
    const isMonthly = s.view === "monthly";
    const headers = isMonthly
      ? ["Mo","Payment","Principal","Interest","Balance"]
      : ["Year","Total Pmts","Principal","Interest","Ending Bal"];
    const rows = isMonthly
      ? scenario.rows.slice(0,24).map(r => [r.month, fmtCur(r.payment), fmtCur(r.principal), fmtCur(r.interest), fmtCur(r.balance)])
      : annual.map(r => [`Year ${r.year}`, fmtCur(r.payment), fmtCur(r.principal), fmtCur(r.interest), fmtCur(r.balance)]);

    $("#scen-schedule").innerHTML = `
      <div class="schedule-table-card">
        <div class="schedule-table-head">
          <h3>${isMonthly ? "Monthly amortization" : "Annual amortization"}</h3>
        </div>
        <div style="overflow-x:auto">
          <table class="sched">
            <thead><tr>${headers.map((h,i)=>`<th class="${i===0?'':'num'}">${h}</th>`).join("")}</tr></thead>
            <tbody>
              ${rows.map(r => `<tr>
                <td>${r[0]}</td>
                <td class="num">${r[1]}</td>
                <td class="num principal">${r[2]}</td>
                <td class="num interest">${r[3]}</td>
                <td class="num balance">${r[4]}</td>
              </tr>`).join("")}
            </tbody>
          </table>
        </div>
        ${isMonthly ? '<p class="table-footer">Showing first 24 months. Export full schedule in production.</p>' : ''}
      </div>
    `;
  }

  wireActions(container, {
    "run": runScenario,
    "view-monthly": () => { s.view = "monthly"; renderContent(); },
    "view-annual": () => { s.view = "annual"; renderContent(); },
    next: () => goto("lender-match"),
    back: () => goto("qa"),
  });

  runScenario();
}

    + listRow({ title:"Title / survey", sub:"Vault docs shared to lender counsel.", right: statusPill("Done","good") })
    + listRow({ title:"Insurance certificates", sub:"Need lender named as mortgagee / additional insured.", right: statusPill("Pending","warn") })
    + listRow({ title:"Entity resolution / signatures", sub:"Borrowing resolution for Johnson Realty LLC.", right: statusPill("Pending","warn") })
  );
  const funded = sectionCard("When funded", null, `
    <div style="display:flex; gap:8px; align-items:flex-start; margin-bottom:12px">
      ${iconSize("i-alert",16,"icon")}
      <div style="font-size:11px; color:var(--muted-foreground); line-height:1.6">
        <p style="margin-bottom:4px">On funding, CFOworks should:</p>
        <ul style="padding-left:18px; list-style:disc">
          <li>Create / update the live loan in Loans module</li>
          <li>Update Banking funding account</li>
          <li>Post accounting entries (liability, fees, payoff)</li>
          <li>Refresh AI CFO cashflow / refi logic</li>
        </ul>
      </div>
    </div>
    ${primaryBtn(`${iconSize("i-check",14)} Mark loan funded`, "next")}
    <button class="btn secondary" style="margin-top:8px">Upload closing package</button>
  `);
  container.innerHTML = checklist + funded;
  wrap.appendChild(container);
  wireActions(container, { next: () => goto("home") });
}

// ═══ Tab: Modeler ═════════════════════════════════════════════════
function renderModeler(wrap) {
  const container = document.createElement("div");
  container.className = "stack";

  const model1 = computeAmortization(state.modelAmount, state.modelRate, state.modelTerm);
  const model2 = computeAmortization(state.modelAmount, state.compareRate, state.modelTerm);

  const inputsCard = document.createElement("div");
  inputsCard.className = "section-card";
  inputsCard.innerHTML = `
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:16px">
      ${iconSize("i-calc",16,"icon")}
      <h2>Scenario Modeler</h2>
      <span style="margin-left:auto; font-size:11px; color:var(--muted-foreground)">Compare 2 rates</span>
    </div>
    <div class="stack" style="gap:12px">
      <div class="form-field">
        <label class="form-label">Loan Amount</label>
        <div class="input-prefix"><input class="text-input" type="number" id="m-amount" value="${state.modelAmount}"/></div>
      </div>
      <div class="grid-2">
        <div class="form-field">
          <label class="form-label">Term</label>
          <select class="select-input" id="m-term">
            ${[60,120,180,240,360].map(v => `<option value="${v}" ${state.modelTerm===v?'selected':''}>${v/12} yr (${v})</option>`).join("")}
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">Entity</label>
          <select class="select-input">
            <option>Personal</option><option>Johnson Real Estate LLC</option><option>MJ Tech Consulting</option><option>Urban Eats Group</option>
          </select>
        </div>
      </div>
      <div class="grid-2">
        <div class="form-field">
          <label class="form-label">Rate A (%)</label>
          <div class="input-suffix"><input class="text-input" type="number" step="0.125" id="m-rate-a" value="${state.modelRate}"/></div>
        </div>
        <div class="form-field">
          <label class="form-label">Rate B (%)</label>
          <div class="input-suffix"><input class="text-input" type="number" step="0.125" id="m-rate-b" value="${state.compareRate}"/></div>
        </div>
      </div>
    </div>
  `;

  const comparePairHtml = `
    <div class="compare-grid">
      ${["A","B"].map((L,i) => {
        const rate = i === 0 ? state.modelRate : state.compareRate;
        const data = i === 0 ? model1 : model2;
        return `
          <div class="compare-card ${i === 0 ? 'a' : 'b'}">
            <p class="label">Scenario ${L}</p>
            <p class="rate">${rate}% APR</p>
            <div class="mini-row"><p class="label">Monthly</p><p class="value">${fmtCur(data.payment)}</p></div>
            <div class="mini-row"><p class="label">Total Interest</p><p class="value">${fmt(data.totalInterest)}</p></div>
            <div class="mini-row"><p class="label">Total Paid</p><p class="value">${fmt(data.totalPaid)}</p></div>
          </div>
        `;
      }).join("")}
    </div>
  `;

  let savingsHtml = "";
  if (model1.payment !== model2.payment) {
    const aWins = model1.payment < model2.payment;
    savingsHtml = `
      <div class="savings-callout good">
        <div class="icon">${iconSize("i-trend-d",20)}</div>
        <div>
          <p class="title">${aWins
            ? `Rate A saves ${fmtCur(model2.payment - model1.payment)}/mo`
            : `Rate B saves ${fmtCur(model1.payment - model2.payment)}/mo`}</p>
          <p class="sub">Interest diff: ${fmt(Math.abs(model1.totalInterest - model2.totalInterest))} over term</p>
        </div>
      </div>
    `;
  }

  container.appendChild(inputsCard);
  const cmp = document.createElement("div");
  cmp.innerHTML = comparePairHtml + savingsHtml;
  container.appendChild(cmp);
  wrap.appendChild(container);

  const rerender = () => {
    state.modelAmount = Number($("#m-amount").value);
    state.modelTerm = Number($("#m-term").value);
    state.modelRate = Number($("#m-rate-a").value);
    state.compareRate = Number($("#m-rate-b").value);
    renderContent();
  };
  ["m-amount","m-term","m-rate-a","m-rate-b"].forEach(id => $(`#${id}`).addEventListener("input", rerender));
}

// ═══ Tab: Schedule ════════════════════════════════════════════════
function renderSchedule(wrap) {
  const container = document.createElement("div");
  container.className = "stack";

  const selected = loans.find(l => l.id === state.selectedLoanId) || loans[0];
  const amort = computeAmortization(selected.originalAmount, selected.rate, selected.term);
  const yearly = amort.schedule.filter(s => s.month % 12 === 0 || s.month === 1).map(s => ({ year:`Yr ${s.year}`, balance:s.balance }));

  // Pills
  const pills = document.createElement("div");
  pills.className = "selector-pills";
  pills.innerHTML = loans.map(l => `
    <button class="pill-btn ${state.selectedLoanId===l.id?'active':''}" data-loan="${l.id}">${l.type}</button>
  `).join("");
  pills.querySelectorAll("[data-loan]").forEach(b => {
    b.addEventListener("click", () => {
      state.selectedLoanId = b.dataset.loan;
      renderContent();
    });
  });
  container.appendChild(pills);

  // Chart (SVG area)
  const chartCard = document.createElement("div");
  chartCard.className = "schedule-chart";
  const W = 680, H = 160, PAD = 24;
  const xs = yearly.map((_, i) => PAD + (i * (W - PAD*2)) / Math.max(1, yearly.length - 1));
  const maxY = Math.max(...yearly.map(y => y.balance));
  const ys = yearly.map(y => H - PAD - (y.balance / maxY) * (H - PAD*2));
  const line = xs.map((x,i) => `${i===0?'M':'L'}${x},${ys[i]}`).join(" ");
  const area = `${line} L${xs[xs.length-1]},${H-PAD} L${xs[0]},${H-PAD} Z`;
  chartCard.innerHTML = `
    <div class="top-row">
      <div>
        <h2>${selected.type}</h2>
        <p style="font-size:11px; color:var(--muted-foreground); margin-top:2px">${selected.lender} · ${selected.rate}%</p>
      </div>
      <div class="total-interest">
        <p class="label">Total Interest</p>
        <p class="value">${fmt(amort.totalInterest)}</p>
      </div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" class="chart-svg" preserveAspectRatio="none">
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="currentColor" stop-opacity="0.22"/>
          <stop offset="100%" stop-color="currentColor" stop-opacity="0.01"/>
        </linearGradient>
      </defs>
      <g style="color:var(--primary)">
        <path d="${area}" fill="url(#areaGrad)"/>
        <path d="${line}" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
      </g>
    </svg>
  `;
  container.appendChild(chartCard);

  // Table
  const tableCard = document.createElement("div");
  tableCard.className = "schedule-table-card";
  tableCard.innerHTML = `
    <div class="schedule-table-head">
      <h3>Payment Schedule</h3>
      <button class="export-btn">${iconSize("i-download",12)} Export</button>
    </div>
    <div style="overflow-x:auto">
      <table class="sched">
        <thead><tr>${["Mo","Payment","Principal","Interest","Balance"].map((h,i)=>`<th class="${i===0?'':'num'}">${h}</th>`).join("")}</tr></thead>
        <tbody>
          ${amort.schedule.slice(0,20).map(row => `<tr>
            <td>${row.month}</td>
            <td class="num">${fmtCur(row.payment)}</td>
            <td class="num principal">${fmtCur(row.principal)}</td>
            <td class="num interest">${fmtCur(row.interest)}</td>
            <td class="num balance">${fmtCur(row.balance)}</td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>
    <p class="table-footer">Showing first 20 of ${selected.term} months</p>
  `;
  container.appendChild(tableCard);

  wrap.appendChild(container);
}

// ═ Boot ═════════════════════════════════════════════════════════
renderSummary();
renderAll();
</script>
